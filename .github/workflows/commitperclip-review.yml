name: commitperclip PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# Always runs from base branch context — never executes PR code.
# pull_request_target gives access to secrets for untrusted fork PRs.

permissions:
  pull-requests: write
  security-events: write
  checks: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout base branch (never PR code)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: master

      # Dependency Review needs the repository Dependency Graph, which is disabled
      # by default on forks. Skip it there (it hard-errors "not supported on this
      # repository") so the check stays green on forks; it runs normally upstream.
      - name: Dependency Review
        if: ${{ !github.event.repository.fork }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      # The commitperclip gates below authenticate as a GitHub App via
      # COMMITPERCLIP_KEY, which is not available on forks (get-bot-token.mjs exits
      # non-zero when the secret is unset). Skip them on forks so the check stays
      # green; they run normally on the upstream repository where the App is installed.
      - name: Generate commitperclip token
        id: token
        if: ${{ !github.event.repository.fork }}
        run: |
          TOKEN=$(node .github/scripts/get-bot-token.mjs)
          echo "::add-mask::$TOKEN"
          echo "value=$TOKEN" >> $GITHUB_OUTPUT
        env:
          COMMITPERCLIP_KEY: ${{ secrets.COMMITPERCLIP_KEY }}

      - name: Run quality gates
        id: quality
        if: ${{ !github.event.repository.fork && github.event.pull_request.user.login != 'dependabot[bot]' }}
        run: node .github/scripts/run-quality-gates.mjs
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.token.outputs.value }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}

      - name: Run security gates
        if: ${{ !github.event.repository.fork }}
        run: node .github/scripts/check-pr-security.mjs
        continue-on-error: true
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ steps.token.outputs.value }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}

      - name: Fail if quality gates failed
        if: >-
          github.event.pull_request.user.login != 'dependabot[bot]' &&
          steps.quality.outcome == 'failure'
        run: |
          echo "One or more quality gates failed. See commitperclip comment on the PR for details."
          exit 1
